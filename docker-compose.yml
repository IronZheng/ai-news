version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: financial_news
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./financial_news_engine/migrations/001_create_news.sql:/docker-entrypoint-initdb.d/001_create_news.sql

  app:
    build: .
    depends_on:
      - postgres
    env_file:
      - config.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: financial_news
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "8000:8000"
    command: ["python", "main.py", "api"]

volumes:
  pgdata:
